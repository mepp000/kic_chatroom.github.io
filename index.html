<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATMOX Chatbot</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      font-family: "Inter", Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .chat-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        linear-gradient(rgba(0,0,0,0.84), rgba(0,0,0,0.97)),
        repeating-linear-gradient(45deg, #2a2a2a, #2a2a2a 10px, #151515 10px, #151515 22px);
    }

    .chat-wrapper {
      width: 470px;
      min-height: 690px;
      background:
        linear-gradient(rgba(35,35,35,0.92), rgba(12,12,12,0.98)),
        repeating-linear-gradient(135deg, #303030, #303030 8px, #242424 8px, #242424 16px);
      border: 1px solid rgba(190,190,190,0.28);
      border-radius: 24px;
      padding: 24px;
      box-shadow:
        0 0 55px rgba(0,0,0,0.95),
        inset 0 0 30px rgba(255,255,255,0.03);
    }

    .chat-title {
      text-align: center;
      font-family: "Orbitron", sans-serif;
      font-size: 28px;
      letter-spacing: 7px;
      line-height: 1.1;
    }

    .chat-subtitle {
      margin-top: 8px;
      font-family: "Inter", Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: #9f9f9f;
      text-transform: uppercase;
    }

    .chat-credit {
      margin-top: 4px;
      font-family: "Inter", Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 1.6px;
      color: #6f6f6f;
      text-transform: uppercase;
    }

    .glow-line {
      height: 1px;
      margin: 16px 0 14px 0;
      background: linear-gradient(90deg, transparent, #bdbdbd, transparent);
      box-shadow: 0 0 10px rgba(255,255,255,0.45);
    }

    .chat-container {
      height: 550px;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
    }

    .chatroom,
    .chatroom * {
      font-family: "Inter", Arial, sans-serif !important;
    }

    .chatroom {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    .chatroom .chats {
      height: calc(100% - 58px) !important;
      overflow-y: auto !important;
      background:
        linear-gradient(rgba(18,18,18,0.88), rgba(8,8,8,0.95)),
        repeating-linear-gradient(45deg, #2e2e2e, #2e2e2e 7px, #202020 7px, #202020 14px) !important;
      border-radius: 18px 18px 0 0 !important;
      padding: 18px !important;
    }

    .chatroom .message,
    .chatroom .message.bot,
    .chatroom .message.user,
    .chatroom .message.received,
    .chatroom .message.sent {
      max-width: 78% !important;
      padding: 10px 14px !important;
      border-radius: 14px !important;
      font-size: 14px !important;
      line-height: 1.35 !important;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.05);
    }

    .chatroom .message.bot,
    .chatroom .message.received {
      background: linear-gradient(135deg, #3a3a3a, #1f1f1f) !important;
      color: #f2f2f2 !important;
      border: 1px solid #5c5c5c !important;
      margin-right: auto !important;
    }

    .chatroom .message.user,
    .chatroom .message.sent {
      background: linear-gradient(135deg, #d7d7d7, #8f8f8f) !important;
      color: #111 !important;
      border: 1px solid #f1f1f1 !important;
      margin-left: auto !important;
      font-weight: 500 !important;
    }

    .chatroom small,
    .chatroom .time,
    .chatroom .message-time {
      color: #9a9a9a !important;
      font-size: 10px !important;
    }

    .chatroom .input,
    .chatroom .input-area,
    .chatroom form {
      background: #111 !important;
      border-top: 1px solid #444 !important;
      border-radius: 0 0 18px 18px !important;
    }

    .chatroom input,
    .chatroom textarea {
      background: #202020 !important;
      color: white !important;
      border: 1px solid #666 !important;
      border-radius: 999px !important;
      padding-left: 14px !important;
    }

    .chatroom button {
      background: linear-gradient(135deg, #606060, #2d2d2d) !important;
      color: white !important;
      border: 1px solid #777 !important;
      border-radius: 999px !important;
      font-family: "Orbitron", sans-serif !important;
      font-size: 11px !important;
      letter-spacing: 1px !important;
    }
  </style>
</head>

<body>
  <div class="chat-page">
    <div class="chat-wrapper">

      <div class="chat-title">
        ATMOX
        <div class="chat-subtitle">Where Weather Meets Intelligence</div>
        <div class="chat-credit">Powered by Marius Zöllner</div>
      </div>

      <div class="glow-line"></div>

      <div class="chat-container"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    var chatroom = new window.Chatroom({
      host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
      title: "\u00A0",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();

    function removeChatTitle() {
      document.querySelectorAll(".chat-container *").forEach(function(el) {
        const text = el.textContent.trim();

        if (text === "Chat") {
          el.textContent = "";
          el.style.height = "0px";
          el.style.minHeight = "0px";
          el.style.padding = "0px";
          el.style.margin = "0px";
          el.style.border = "none";
          el.style.overflow = "hidden";
          el.style.display = "none";
        }
      });
    }

    removeChatTitle();
    setTimeout(removeChatTitle, 100);
    setTimeout(removeChatTitle, 500);
    setTimeout(removeChatTitle, 1000);

    const observer = new MutationObserver(removeChatTitle);
    observer.observe(document.querySelector(".chat-container"), {
      childList: true,
      subtree: true
    });
  </script>
</body>
</html>
