<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATMOX</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --green: #004225;
      --green-light: #0b6b43;
      --green-glow: rgba(0, 66, 37, 0.45);
      --text-dark: #171717;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Inter", sans-serif;
      color: var(--text-dark);
      background:
        radial-gradient(circle at 50% 32%, rgba(255,255,255,0.18), transparent 34%),
        linear-gradient(rgba(42,43,45,0.92), rgba(24,25,27,0.96)),
        repeating-linear-gradient(135deg, #4a4b4d, #4a4b4d 7px, #343537 7px, #343537 17px);
    }

    .cloud {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.42);
      filter: blur(42px);
      opacity: 0.72;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
    }

    .cloud::before {
      width: 60%;
      height: 130%;
      top: -60%;
      left: 10%;
    }

    .cloud::after {
      width: 70%;
      height: 150%;
      top: -75%;
      right: 8%;
    }

    .cloud-1 {
      width: 520px;
      height: 170px;
      left: -120px;
      top: 15%;
      animation-name: cloudMove;
      animation-duration: 38s;
    }

    .cloud-2 {
      width: 620px;
      height: 200px;
      left: -220px;
      bottom: 16%;
      opacity: 0.6;
      animation-name: cloudMove;
      animation-duration: 58s;
    }

    .cloud-3 {
      width: 380px;
      height: 130px;
      left: 35%;
      top: 55%;
      opacity: 0.45;
      animation-name: cloudMove;
      animation-duration: 78s;
    }

    @keyframes cloudMove {
      from { transform: translateX(-15vw); }
      to { transform: translateX(120vw); }
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255,255,255,0.18), transparent 40%),
        linear-gradient(rgba(42,43,45,0.78), rgba(20,21,23,0.88)),
        repeating-linear-gradient(135deg, rgba(76,77,79,0.82), rgba(76,77,79,0.82) 7px, rgba(53,54,56,0.82) 7px, rgba(53,54,56,0.82) 17px);
      transition: opacity 0.9s ease;
    }

    .intro-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .intro-card {
      position: relative;
      z-index: 22;
      width: 460px;
      min-height: 540px;
      padding: 56px 42px;
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.86), rgba(255,255,255,0.54)),
        rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      box-shadow:
        0 34px 90px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
    }

    #welcome-word {
      font-size: 24px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 0.6px;
    }

    .intro-logo {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-size: 46px;
      letter-spacing: 10px;
      color: #111;
    }

    .enter-btn {
      margin-top: 18px;
      width: 260px;
      height: 66px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.85);
      background: linear-gradient(145deg, rgba(255,255,255,0.78), rgba(235,235,235,0.45));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #333;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow:
        0 12px 28px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.95);
      transition: 0.25s ease;
    }

    .enter-btn:hover {
      color: white;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(0,0,0,0.26), 0 0 24px var(--green-glow);
    }

    .enter-btn:active { transform: scale(0.97); }

    .app {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .app.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .atmox-card {
      width: 500px;
      height: 720px;
      padding: 26px;
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.58), rgba(255,255,255,0.26)),
        rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.72);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow:
        0 38px 95px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.95),
        inset 0 -30px 70px rgba(255,255,255,0.18);
      display: flex;
      flex-direction: column;
    }

    .brand { text-align: center; }

    .brand-title {
      font-family: "Orbitron", sans-serif;
      font-size: 30px;
      letter-spacing: 8px;
      color: #111;
    }

    .brand-subtitle {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      color: #707070;
    }

    .brand-credit {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #9a9a9a;
    }

    .green-line {
      position: relative;
      height: 2px;
      margin: 18px 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      overflow: hidden;
      box-shadow: 0 0 16px rgba(0,66,37,0.35);
    }

    .green-line::after {
      content: "";
      position: absolute;
      top: 0;
      left: -45%;
      width: 45%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #16a36b, transparent);
      box-shadow: 0 0 18px rgba(0,66,37,0.75);
      animation: scan 3.2s ease-in-out infinite;
    }

    @keyframes scan {
      from { left: -45%; }
      to { left: 100%; }
    }

    .chat-container {
      flex: 1;
      border-radius: 26px;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.44), rgba(255,255,255,0.20)),
        rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.78);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 14px 34px rgba(0,0,0,0.16);
    }

    .chatroom,
    .chatroom * {
      font-family: "Inter", sans-serif !important;
    }

    .chatroom {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
      display: flex !important;
      flex-direction: column !important;
    }

    .chatroom .header,
    .chatroom header,
    .chatroom .chatroom-title,
    .chatroom .title {
      display: none !important;
      height: 0 !important;
      min-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      overflow: hidden !important;
    }

    .chatroom .chats {
      flex: 1 !important;
      height: auto !important;
      overflow-y: auto !important;
      padding: 22px !important;
      background: transparent !important;
    }

    .chatroom .message,
    .chatroom .message.bot,
    .chatroom .message.user,
    .chatroom .message.received,
    .chatroom .message.sent {
      max-width: 78% !important;
      padding: 12px 15px !important;
      font-size: 14px !important;
      line-height: 1.35 !important;
      box-shadow: 0 10px 26px rgba(0,0,0,0.12) !important;
    }

    /* 🔥 HIER IST DIE EINZIGE ÄNDERUNG */
    .chatroom .message.bot,
    .chatroom .message.received {
      border-radius: 28px 28px 28px 10px !important;
    }

    .chatroom .message.user,
    .chatroom .message.sent {
      border-radius: 28px 28px 10px 28px !important;
    }

    .chatroom .message.bot,
    .chatroom .message.received {
      background: rgba(255,255,255,0.72) !important;
      color: #222 !important;
      border: 1px solid rgba(255,255,255,0.9) !important;
      margin-right: auto !important;
    }

    .chatroom .message.user,
    .chatroom .message.sent {
      background: linear-gradient(135deg, var(--green), var(--green-light)) !important;
      color: white !important;
      border: 1px solid rgba(255,255,255,0.38) !important;
      margin-left: auto !important;
      font-weight: 500 !important;
    }

    .chatroom small,
    .chatroom .time,
    .chatroom .message-time {
      color: #9a9a9a !important;
      font-size: 10px !important;
    }

    .chatroom form,
    .chatroom .input,
    .chatroom .input-area {
      flex-shrink: 0 !important;
      background: rgba(255,255,255,0.54) !important;
      border-top: 1px solid rgba(255,255,255,0.82) !important;
      border-radius: 0 0 26px 26px !important;
    }

    .chatroom input,
    .chatroom textarea {
      background: rgba(255,255,255,0.72) !important;
      color: #222 !important;
      border: 1px solid rgba(0,0,0,0.12) !important;
      border-radius: 999px !important;
      padding-left: 14px !important;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.06) !important;
    }

    .chatroom input:focus,
    .chatroom textarea:focus {
      outline: none !important;
      border-color: var(--green) !important;
      box-shadow: 0 0 0 3px rgba(0,66,37,0.12) !important;
    }

    .chatroom button {
      background: linear-gradient(135deg, var(--green), var(--green-light)) !important;
      color: white !important;
      border: none !important;
      border-radius: 999px !important;
      font-family: "Orbitron", sans-serif !important;
      font-size: 10px !important;
      letter-spacing: 1px !important;
      font-weight: 700 !important;
      box-shadow: 0 8px 18px rgba(0,66,37,0.28) !important;
    }
  </style>
</head>

<body>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div class="intro-screen" id="introScreen">
    <div class="intro-card">
      <span id="welcome-word">Welcome</span>
      <h1 class="intro-logo">ATMOX</h1>
      <button class="enter-btn" id="enterAtmox">Click to enter</button>
    </div>
  </div>

  <div class="app">
    <div class="atmox-card">
      <div class="brand">
        <div class="brand-title">ATMOX</div>
        <div class="brand-subtitle">Where Weather Meets Intelligence</div>
        <div class="brand-credit">Powered by Marius</div>
      </div>

      <div class="green-line"></div>
      <div class="chat-container"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    const words = [
      "Welcome", "Willkommen", "Bienvenue", "Bienvenido", "Benvenuto",
      "Welkom", "Witamy", "Karibu", "ようこそ", "환영합니다"
    ];

    let index = 0;
    const welcomeWord = document.getElementById("welcome-word");

    setInterval(() => {
      index = (index + 1) % words.length;
      welcomeWord.textContent = words[index];
    }, 2500);

    document.getElementById("enterAtmox").addEventListener("click", () => {
      const intro = document.getElementById("introScreen");
      const app = document.querySelector(".app");

      intro.classList.add("hidden");

      setTimeout(() => {
        app.classList.add("visible");
      }, 350);
    });

    var chatroom = new window.Chatroom({
      host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();

    function removeDefaultChatHeader() {
      document.querySelectorAll(".chat-container *").forEach((el) => {
        if (el.textContent.trim() === "Chat") {
          el.style.display = "none";
          el.style.height = "0";
          el.style.padding = "0";
          el.style.margin = "0";
          el.style.overflow = "hidden";
        }
      });
    }

    removeDefaultChatHeader();
    setTimeout(removeDefaultChatHeader, 300);
    setTimeout(removeDefaultChatHeader, 1000);

    new MutationObserver(removeDefaultChatHeader).observe(
      document.querySelector(".chat-container"),
      { childList: true, subtree: true }
    );
  </script>
</body>
</html>
