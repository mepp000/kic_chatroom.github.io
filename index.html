<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATMOX</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;

  /* 🧱 HELLER BETON */
  background:
    linear-gradient(rgba(255,255,255,0.92), rgba(245,245,245,0.96)),
    repeating-linear-gradient(
      135deg,
      #e6e6e6,
      #e6e6e6 6px,
      #dcdcdc 6px,
      #dcdcdc 14px
    );

  font-family: "Inter", sans-serif;
  color: #111;
  overflow: hidden;
}

/* ☁️ BACKGROUND CLOUDS */
.background-cloud {
  position: fixed;
  z-index: 0;
  pointer-events: none;

  background: rgba(180,180,180,0.25);
  border-radius: 999px;
  filter: blur(70px);
  mix-blend-mode: multiply;
}

.cloud-1 {
  width: 500px;
  height: 180px;
  left: -200px;
  top: 20%;
  animation: moveClouds 50s linear infinite;
}

.cloud-2 {
  width: 650px;
  height: 220px;
  left: -300px;
  bottom: 20%;
  animation: moveClouds 70s linear infinite;
  opacity: 0.6;
}

.cloud-3 {
  width: 420px;
  height: 150px;
  left: -150px;
  top: 55%;
  animation: moveClouds 90s linear infinite;
  opacity: 0.5;
}

@keyframes moveClouds {
  from { transform: translateX(0); }
  to { transform: translateX(calc(100vw + 400px)); }
}

/* 📦 CENTER CARD */
.wrapper {
  position: relative;
  z-index: 2;

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 470px;
  height: 690px;

  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);

  border-radius: 24px;
  border: 1px solid rgba(0,0,0,0.08);

  box-shadow: 0 20px 60px rgba(0,0,0,0.15);

  padding: 24px;

  display: flex;
  flex-direction: column;
}

/* 🧠 HEADER */
.title {
  text-align: center;
  font-family: "Orbitron";
  font-size: 26px;
  letter-spacing: 6px;
}

.subtitle {
  font-size: 11px;
  letter-spacing: 2px;
  color: #666;
  margin-top: 8px;
}

.credit {
  font-size: 10px;
  color: #999;
}

/* ✨ DIVIDER */
.line {
  height: 1px;
  margin: 14px 0;
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.2), transparent);
}

/* 💬 CHAT */
.chat-container {
  flex: 1;
  border-radius: 18px;
  overflow: hidden;
}

/* REMOVE HEADER */
.chatroom .header,
.chatroom header,
.chatroom .chatroom-title,
.chatroom .title {
  display: none !important;
}

.chatroom {
  display: flex !important;
  flex-direction: column !important;
  height: 100% !important;
  background: transparent !important;
}

/* CHAT AREA */
.chatroom .chats {
  flex: 1 !important;
  overflow-y: auto !important;
  padding: 18px !important;
}

/* MESSAGES */
.chatroom .message.received {
  background: #f1f1f1 !important;
  color: #111 !important;
  border-radius: 14px !important;
}

.chatroom .message.sent {
  background: #dcdcdc !important;
  color: #111 !important;
  border-radius: 14px !important;
}

/* INPUT */
.chatroom input {
  background: #f5f5f5 !important;
  border-radius: 999px !important;
  border: 1px solid #ddd !important;
}

.chatroom button {
  background: #e0e0e0 !important;
  border-radius: 999px !important;
}

/* 🌍 INTRO SCREEN */
.intro {
  position: fixed;
  inset: 0;
  z-index: 10;

  display: flex;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(rgba(255,255,255,0.95), rgba(240,240,240,0.98));
  transition: opacity 1s ease;
}

.intro.hidden {
  opacity: 0;
  pointer-events: none;
}

#welcome {
  font-size: 22px;
  color: #666;
  text-align: center;
}
</style>
</head>

<body>

<!-- ☁️ CLOUDS -->
<div class="background-cloud cloud-1"></div>
<div class="background-cloud cloud-2"></div>
<div class="background-cloud cloud-3"></div>

<!-- 🌍 INTRO -->
<div class="intro" id="intro" onclick="enterApp()">
  <div>
    <div id="welcome">Welcome</div>
    <h1 style="font-family:Orbitron;letter-spacing:8px;">ATMOX</h1>
    <div>Click to enter</div>
  </div>
</div>

<!-- 💎 APP -->
<div class="wrapper">
  <div class="card">

    <div class="title">ATMOX</div>
    <div class="subtitle">Where Weather Meets Intelligence</div>
    <div class="credit">Powered by Marius</div>

    <div class="line"></div>

    <div class="chat-container"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
/* 🌍 MULTI LANGUAGE INTRO */
const words = ["Welcome","Willkommen","Bienvenue","Bienvenido","Benvenuto","Welkom","Witamy","Karibu","ようこそ","환영합니다"];
let i = 0;

setInterval(() => {
  i = (i + 1) % words.length;
  document.getElementById("welcome").textContent = words[i];
}, 2500);

/* INTRO CLOSE */
function enterApp(){
  document.getElementById("intro").classList.add("hidden");
}

/* CHAT */
var chatroom = new window.Chatroom({
  host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
  title: "",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
  speechRecognition: "en-US",
  voiceLang: "en-US"
});

chatroom.openChat();
</script>

</body>
</html>
