<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATMOX Chatbot</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      font-family: "Inter", Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    /* ---------- CHAT WRAPPER ---------- */

    .chat-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        linear-gradient(rgba(0,0,0,0.84), rgba(0,0,0,0.97)),
        repeating-linear-gradient(45deg, #2a2a2a, #2a2a2a 10px, #151515 10px, #151515 22px);
    }

    .chat-wrapper {
      width: 470px;
      min-height: 690px;
      background:
        linear-gradient(rgba(35,35,35,0.92), rgba(12,12,12,0.98)),
        repeating-linear-gradient(135deg, #303030, #303030 8px, #242424 8px, #242424 16px);
      border: 1px solid rgba(190,190,190,0.28);
      border-radius: 24px;
      padding: 24px;
      box-shadow:
        0 0 55px rgba(0,0,0,0.95),
        inset 0 0 30px rgba(255,255,255,0.03);
    }

    .chat-title {
      text-align: center;
      margin-bottom: 18px;
      font-family: "Orbitron", sans-serif;
      font-size: 28px;
      letter-spacing: 7px;
    }

    .chat-subtitle {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #9f9f9f;
      text-transform: uppercase;
    }

    .chat-credit {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 1.6px;
      color: #6f6f6f;
      text-transform: uppercase;
    }

    .chat-container {
      height: 550px;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
    }

    

    .chatroom,
    .chatroom * {
      font-family: "Inter", Arial, sans-serif !important;
    }

    .chatroom {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      background: transparent !important;
    }

    
    .chatroom > div:first-child {
      display: none !important;
    }

    .chatroom .header,
    .chatroom .title,
    .chatroom .chatroom-title {
      display: none !important;
    }

  
    .chatroom .chats {
  height: calc(100% - 60px) !important;
  margin-top: 10px !important;
  overflow-y: auto !important;

  background:
    linear-gradient(rgba(18,18,18,0.88), rgba(8,8,8,0.95)),
    repeating-linear-gradient(
      45deg,
      #2e2e2e,
      #2e2e2e 7px,
      #202020 7px,
      #202020 14px
    ) !important;

  border-radius: 18px 18px 0 0 !important;
  padding: 18px !important;
}
    }

    .chatroom .message {
      max-width: 78% !important;
      padding: 10px 14px !important;
      border-radius: 14px !important;
      font-size: 14px !important;
    }

    .chatroom .message.received {
      background: #2a2a2a !important;
      color: white !important;
    }

    .chatroom .message.sent {
      background: #d7d7d7 !important;
      color: black !important;
    }

    .chatroom input {
      background: #202020 !important;
      color: white !important;
      border-radius: 999px !important;
    }

    .chatroom button {
      background: #444 !important;
      color: white !important;
      border-radius: 999px !important;
    }

  </style>
</head>

<body>

  <div class="chat-page">
    <div class="chat-wrapper">

      <div class="chat-title">
        ATMOX
        <div class="chat-subtitle">Where Weather Meets Intelligence</div>
        <div class="chat-credit">Powered by Marius Zöllner</div>
      </div>

      <div class="chat-container"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    var chatroom = new window.Chatroom({
      host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Hello and welcome to ATMOX. How can I help you?"
    });

    chatroom.openChat();
  </script>

</body>
</html>
