<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATMOX Chatbot</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.84), rgba(0,0,0,0.97)),
    repeating-linear-gradient(45deg,#2a2a2a,#2a2a2a 10px,#151515 10px,#151515 22px);
  font-family: "Inter", Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* ---------- BACKGROUND CLOUDS ---------- */

.background-cloud {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  background: rgba(200,200,200,0.12);
  border-radius: 999px;
  filter: blur(36px);
}

.background-cloud::before,
.background-cloud::after {
  content: "";
  position: absolute;
  background: rgba(220,220,220,0.1);
  border-radius: 50%;
}

.background-cloud::before {
  width: 55%;
  height: 120%;
  top: -55%;
  left: 12%;
}

.background-cloud::after {
  width: 65%;
  height: 145%;
  top: -72%;
  right: 8%;
}

.cloud-bg-1 {
  width: 520px;
  height: 180px;
  left: -600px;
  top: 20%;
  animation: moveClouds 60s linear infinite;
}

.cloud-bg-2 {
  width: 680px;
  height: 220px;
  left: -800px;
  bottom: 20%;
  animation: moveClouds 80s linear infinite;
  opacity: 0.4;
}

.cloud-bg-3 {
  width: 420px;
  height: 150px;
  left: -500px;
  top: 55%;
  animation: moveClouds 100s linear infinite;
  opacity: 0.3;
}

@keyframes moveClouds {
  from { transform: translateX(0); }
  to { transform: translateX(calc(100vw + 900px)); }
}

/* ---------- INTRO ---------- */

.intro-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    repeating-linear-gradient(45deg,#2b2b2b,#2b2b2b 10px,#151515 10px,#151515 22px);
  z-index: 10;
  transition: opacity 1s ease;
}

.intro-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.intro-content {
  text-align: center;
  cursor: pointer;
}

#welcome-word {
  font-size: 22px;
  margin-bottom: 10px;
  color: #ccc;
}

.intro-content h1 {
  font-family: "Orbitron";
  letter-spacing: 8px;
}

/* ---------- CHAT ---------- */

.chat-page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 1;
}

.chat-wrapper {
  width: 470px;
  height: 690px;
  border-radius: 24px;
  padding: 24px;
  background: linear-gradient(#222,#111);
  display: flex;
  flex-direction: column;
}

.chat-title {
  text-align: center;
  font-family: "Orbitron";
  letter-spacing: 7px;
}

.chat-subtitle {
  font-size: 11px;
  color: #999;
  margin-top: 8px;
}

.chat-credit {
  font-size: 10px;
  color: #666;
}

.glow-line {
  height: 1px;
  margin: 14px 0;
  background: linear-gradient(90deg,transparent,#aaa,transparent);
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

.chat-container {
  flex: 1;
  border-radius: 18px;
  overflow: hidden;
}

/* ---------- CHATROOM FIX ---------- */

.chatroom {
  display: flex !important;
  flex-direction: column !important;
  height: 100% !important;
}

/* HEADER KILL */
.chatroom .header,
.chatroom header,
.chatroom .chatroom-title,
.chatroom .title {
  display: none !important;
}

.chatroom .chats {
  flex: 1 !important;
  overflow-y: auto !important;
  padding: 18px !important;
}

.chatroom form {
  flex-shrink: 0 !important;
}
</style>
</head>

<body>

<!-- BACKGROUND CLOUDS -->
<div class="background-cloud cloud-bg-1"></div>
<div class="background-cloud cloud-bg-2"></div>
<div class="background-cloud cloud-bg-3"></div>

<!-- INTRO -->
<div class="intro-screen" id="intro">
  <div class="intro-content" onclick="enterApp()">
    <div id="welcome-word">Welcome</div>
    <h1>ATMOX</h1>
    <div>Click to enter</div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-page">
  <div class="chat-wrapper">

    <div class="chat-title">
      ATMOX
      <div class="chat-subtitle">Where Weather Meets Intelligence</div>
      <div class="chat-credit">Powered by Marius</div>
    </div>

    <div class="glow-line"></div>

    <div class="chat-container"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>

/* 🌍 Sprache wechseln */
const words = ["Welcome","Willkommen","Bienvenue","Bienvenido","Benvenuto","Welkom","Witamy","Karibu","ようこそ","환영합니다"];
let i = 0;

setInterval(() => {
  i = (i + 1) % words.length;
  document.getElementById("welcome-word").textContent = words[i];
}, 3000);

/* Intro schließen */
function enterApp(){
  document.getElementById("intro").classList.add("hidden");
}

/* Chat starten */
var chatroom = new window.Chatroom({
  host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
  title: "",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
  speechRecognition: "en-US",
  voiceLang: "en-US"
});

chatroom.openChat();

</script>

</body>
</html>
