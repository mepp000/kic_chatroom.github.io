<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATMOX</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  font-family: "Inter", sans-serif;
  color: #f4f7fb;
  background:
    radial-gradient(circle at 50% 25%, rgba(95, 130, 170, 0.18), transparent 38%),
    linear-gradient(rgba(5, 9, 14, 0.88), rgba(3, 6, 10, 0.96)),
    repeating-linear-gradient(
      135deg,
      #111827,
      #111827 7px,
      #0b0f14 7px,
      #0b0f14 16px
    );
}

/* BACKGROUND ATMOSPHERE */
.fog {
  position: fixed;
  inset: -20%;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 20% 35%, rgba(180, 210, 240, 0.14), transparent 22%),
    radial-gradient(circle at 70% 60%, rgba(130, 160, 195, 0.12), transparent 28%),
    radial-gradient(circle at 40% 80%, rgba(210, 220, 230, 0.08), transparent 25%);
  filter: blur(40px);
  animation: fogDrift 34s linear infinite alternate;
}

@keyframes fogDrift {
  from { transform: translateX(-5%) translateY(2%); }
  to { transform: translateX(6%) translateY(-3%); }
}

/* INTRO */
.intro-screen {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at center, rgba(45, 65, 90, 0.35), rgba(3, 6, 10, 0.98)),
    repeating-linear-gradient(
      135deg,
      #151b24,
      #151b24 8px,
      #0b0f14 8px,
      #0b0f14 18px
    );
  transition: opacity 1.1s ease;
}

.intro-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.intro-cloud {
  position: absolute;
  width: 620px;
  height: 220px;
  border-radius: 999px;
  background: rgba(190, 210, 230, 0.18);
  filter: blur(38px);
  transition: transform 2.1s ease, opacity 1.6s ease;
}

.intro-cloud.left {
  left: -120px;
  top: 25%;
}

.intro-cloud.right {
  right: -140px;
  bottom: 25%;
}

.intro-screen.open .intro-cloud.left {
  transform: translateX(-120vw);
  opacity: 0;
}

.intro-screen.open .intro-cloud.right {
  transform: translateX(120vw);
  opacity: 0;
}

.intro-content {
  position: relative;
  z-index: 2;
  text-align: center;
  cursor: pointer;
  padding: 46px 82px;
  border-radius: 28px;
  background: rgba(20, 25, 32, 0.68);
  border: 1px solid rgba(210, 230, 255, 0.16);
  backdrop-filter: blur(18px);
  box-shadow:
    0 0 70px rgba(0,0,0,0.65),
    inset 0 0 40px rgba(255,255,255,0.035);
}

#welcome-word {
  display: block;
  margin-bottom: 12px;
  font-size: 22px;
  color: #aeb9c7;
  letter-spacing: 2px;
}

.intro-content h1 {
  margin: 0;
  font-family: "Orbitron", sans-serif;
  font-size: 48px;
  letter-spacing: 10px;
}

.click-hint {
  margin-top: 18px;
  font-size: 12px;
  color: #7f8b99;
  letter-spacing: 1.5px;
}

/* APP */
.app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.atmox-card {
  width: 470px;
  height: 700px;
  padding: 24px;
  border-radius: 28px;
  background: rgba(17, 24, 39, 0.72);
  border: 1px solid rgba(210, 230, 255, 0.16);
  backdrop-filter: blur(18px);
  box-shadow:
    0 28px 80px rgba(0,0,0,0.55),
    inset 0 0 40px rgba(255,255,255,0.035);
  display: flex;
  flex-direction: column;
  animation: cardFloat 7s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.brand {
  text-align: center;
}

.brand-title {
  font-family: "Orbitron", sans-serif;
  font-size: 30px;
  letter-spacing: 8px;
  color: #f8fbff;
}

.brand-subtitle {
  margin-top: 8px;
  font-size: 11px;
  letter-spacing: 2.4px;
  text-transform: uppercase;
  color: #aeb9c7;
}

.brand-credit {
  margin-top: 4px;
  font-size: 10px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: #6f7c8b;
}

.scan-line {
  position: relative;
  height: 1px;
  margin: 16px 0 14px;
  overflow: hidden;
  background: linear-gradient(90deg, transparent, rgba(180, 210, 240, 0.35), transparent);
}

.scan-line::after {
  content: "";
  position: absolute;
  top: 0;
  left: -40%;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d7ecff, transparent);
  box-shadow: 0 0 12px rgba(190, 225, 255, 0.8);
  animation: scan 3s ease-in-out infinite;
}

@keyframes scan {
  from { left: -40%; }
  to { left: 100%; }
}

.chat-container {
  flex: 1;
  border-radius: 20px;
  overflow: hidden;
  background:
    linear-gradient(rgba(12,18,26,0.82), rgba(7,11,18,0.94)),
    repeating-linear-gradient(
      135deg,
      #16202b,
      #16202b 7px,
      #101722 7px,
      #101722 15px
    );
  border: 1px solid rgba(210,230,255,0.12);
}

/* CHATROOM OVERRIDE */
.chatroom,
.chatroom * {
  font-family: "Inter", sans-serif !important;
}

.chatroom {
  width: 100% !important;
  height: 100% !important;
  border: none !important;
  box-shadow: none !important;
  background: transparent !important;
  display: flex !important;
  flex-direction: column !important;
}

/* Kill default "Chat" header */
.chatroom .header,
.chatroom header,
.chatroom .title,
.chatroom .chatroom-title,
.chatroom h1,
.chatroom h2,
.chatroom h3 {
  display: none !important;
  height: 0 !important;
  min-height: 0 !important;
  padding: 0 !important;
  margin: 0 !important;
  overflow: hidden !important;
}

.chatroom .chats {
  flex: 1 !important;
  height: auto !important;
  overflow-y: auto !important;
  padding: 18px !important;
  background: transparent !important;
}

.chatroom .message,
.chatroom .message.bot,
.chatroom .message.user,
.chatroom .message.received,
.chatroom .message.sent {
  max-width: 78% !important;
  padding: 11px 14px !important;
  border-radius: 16px !important;
  font-size: 14px !important;
  line-height: 1.35 !important;
  box-shadow: 0 8px 22px rgba(0,0,0,0.25) !important;
}

.chatroom .message.bot,
.chatroom .message.received {
  background: rgba(31, 41, 55, 0.88) !important;
  color: #f4f7fb !important;
  border: 1px solid rgba(210,230,255,0.14) !important;
  margin-right: auto !important;
}

.chatroom .message.user,
.chatroom .message.sent {
  background: linear-gradient(135deg, #dce8f5, #aebfd0) !important;
  color: #0b0f14 !important;
  border: 1px solid rgba(255,255,255,0.6) !important;
  margin-left: auto !important;
  font-weight: 500 !important;
}

.chatroom small,
.chatroom .time,
.chatroom .message-time {
  color: #7f8b99 !important;
  font-size: 10px !important;
}

.chatroom form,
.chatroom .input,
.chatroom .input-area {
  flex-shrink: 0 !important;
  background: rgba(7, 11, 18, 0.9) !important;
  border-top: 1px solid rgba(210,230,255,0.12) !important;
  border-radius: 0 0 20px 20px !important;
}

.chatroom input,
.chatroom textarea {
  background: rgba(255,255,255,0.08) !important;
  color: #f4f7fb !important;
  border: 1px solid rgba(210,230,255,0.22) !important;
  border-radius: 999px !important;
  padding-left: 14px !important;
}

.chatroom input:focus,
.chatroom textarea:focus {
  outline: none !important;
  border-color: rgba(190,225,255,0.75) !important;
  box-shadow: 0 0 14px rgba(150,200,255,0.18) !important;
}

.chatroom button {
  background: linear-gradient(135deg, #dce8f5, #7f96ad) !important;
  color: #07101a !important;
  border: none !important;
  border-radius: 999px !important;
  font-family: "Orbitron", sans-serif !important;
  font-size: 10px !important;
  letter-spacing: 1px !important;
  font-weight: 700 !important;
}

.chatroom ::-webkit-scrollbar {
  width: 7px;
}

.chatroom ::-webkit-scrollbar-track {
  background: transparent;
}

.chatroom ::-webkit-scrollbar-thumb {
  background: rgba(210,230,255,0.24);
  border-radius: 10px;
}
</style>
</head>

<body>
<div class="fog"></div>

<div class="intro-screen" id="introScreen">
  <div class="intro-cloud left"></div>
  <div class="intro-cloud right"></div>

  <div class="intro-content" id="enterAtmox">
    <span id="welcome-word">Welcome</span>
    <h1>ATMOX</h1>
    <div class="click-hint">Click to enter</div>
  </div>
</div>

<div class="app">
  <div class="atmox-card">
    <div class="brand">
      <div class="brand-title">ATMOX</div>
      <div class="brand-subtitle">Atmospheric Intelligence</div>
      <div class="brand-credit">Powered by Marius Zöllner</div>
    </div>

    <div class="scan-line"></div>

    <div class="chat-container"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
const words = [
  "Welcome",
  "Willkommen",
  "Bienvenue",
  "Bienvenido",
  "Benvenuto",
  "Welkom",
  "Witamy",
  "Karibu",
  "ようこそ",
  "환영합니다"
];

let index = 0;
const welcomeWord = document.getElementById("welcome-word");

setInterval(() => {
  index = (index + 1) % words.length;
  welcomeWord.textContent = words[index];
}, 2500);

const introScreen = document.getElementById("introScreen");
const enterAtmox = document.getElementById("enterAtmox");

enterAtmox.addEventListener("click", () => {
  introScreen.classList.add("open");

  setTimeout(() => {
    introScreen.classList.add("hidden");
  }, 1400);
});

var chatroom = new window.Chatroom({
  host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
  title: "",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
  speechRecognition: "en-US",
  voiceLang: "en-US"
});

chatroom.openChat();

/* Extra safety: remove default Chat title if library injects it late */
function removeDefaultChatTitle() {
  document.querySelectorAll(".chat-container *").forEach(el => {
    if (el.textContent.trim() === "Chat") {
      el.style.display = "none";
      el.style.height = "0";
      el.style.padding = "0";
      el.style.margin = "0";
      el.style.overflow = "hidden";
    }
  });
}

removeDefaultChatTitle();
setTimeout(removeDefaultChatTitle, 200);
setTimeout(removeDefaultChatTitle, 800);

new MutationObserver(removeDefaultChatTitle).observe(
  document.querySelector(".chat-container"),
  { childList: true, subtree: true }
);
</script>
</body>
</html>
