<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATMOX</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

:root {
  --green: #004225;
  --green-light: #0b6b43;
  --white: #f7f8f6;
  --text: #f4f7f5;
  --muted: #aeb7b2;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  font-family: "Inter", sans-serif;
  color: var(--text);

  background:
    radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), transparent 35%),
    linear-gradient(rgba(8,9,10,0.88), rgba(4,5,6,0.96)),
    repeating-linear-gradient(
      135deg,
      #2d2f31,
      #2d2f31 7px,
      #1f2123 7px,
      #1f2123 16px
    );
}

/* ---------- MOVING WHITE CLOUDS ---------- */

.cloud {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  background: rgba(255,255,255,0.28);
  border-radius: 999px;
  filter: blur(38px);
  opacity: 0.9;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: rgba(255,255,255,0.24);
  border-radius: 50%;
}

.cloud::before {
  width: 60%;
  height: 130%;
  top: -60%;
  left: 10%;
}

.cloud::after {
  width: 70%;
  height: 150%;
  top: -75%;
  right: 8%;
}

.cloud-1 {
  width: 620px;
  height: 210px;
  left: -650px;
  top: 18%;
  animation: cloudMove 42s linear infinite;
}

.cloud-2 {
  width: 760px;
  height: 250px;
  left: -850px;
  bottom: 20%;
  opacity: 0.7;
  animation: cloudMove 62s linear infinite;
}

.cloud-3 {
  width: 480px;
  height: 160px;
  left: -520px;
  top: 58%;
  opacity: 0.55;
  animation: cloudMove 82s linear infinite;
}

@keyframes cloudMove {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(calc(100vw + 1000px));
  }
}

/* ---------- INTRO SCREEN ---------- */

.intro-screen {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at center, rgba(255,255,255,0.08), rgba(6,7,8,0.96)),
    repeating-linear-gradient(
      135deg,
      #303235,
      #303235 7px,
      #1d1f21 7px,
      #1d1f21 16px
    );

  transition: opacity 1.1s ease;
}

.intro-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.intro-card {
  width: 460px;
  min-height: 420px;
  padding: 52px 42px;
  border-radius: 32px;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.24);
  backdrop-filter: blur(24px);
  box-shadow:
    0 30px 90px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.22);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
}

#welcome-word {
  font-size: 22px;
  color: #d7ddd9;
  letter-spacing: 1px;
}

.intro-logo {
  margin: 0;
  font-family: "Orbitron", sans-serif;
  font-size: 46px;
  letter-spacing: 10px;
  color: white;
}

.enter-btn {
  margin-top: 18px;
  width: 250px;
  padding: 15px 24px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.32);
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
  color: white;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: 0.25s ease;
}

.enter-btn:hover {
  background: rgba(0,66,37,0.55);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(0,66,37,0.45);
}

.enter-btn:active {
  transform: scale(0.96);
}

/* ---------- APP LAYOUT ---------- */

.app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ---------- APPLE / BRITISH RACING GREEN CARD ---------- */

.atmox-card {
  width: 480px;
  height: 710px;
  padding: 24px;
  border-radius: 32px;

  background:
    linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06)),
    rgba(6, 18, 14, 0.76);

  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(24px);

  box-shadow:
    0 34px 90px rgba(0,0,0,0.6),
    0 0 70px rgba(0,66,37,0.22),
    inset 0 1px 0 rgba(255,255,255,0.24);

  display: flex;
  flex-direction: column;
}

.brand {
  text-align: center;
}

.brand-title {
  font-family: "Orbitron", sans-serif;
  font-size: 30px;
  letter-spacing: 8px;
  color: white;
}

.brand-subtitle {
  margin-top: 8px;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #cbd5cf;
}

.brand-credit {
  margin-top: 4px;
  font-size: 10px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: #87938d;
}

.scan-line {
  height: 1px;
  margin: 16px 0 14px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  position: relative;
  overflow: hidden;
}

.scan-line::after {
  content: "";
  position: absolute;
  left: -40%;
  top: 0;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #ffffff, transparent);
  box-shadow: 0 0 14px rgba(255,255,255,0.75);
  animation: scan 3s ease-in-out infinite;
}

@keyframes scan {
  from { left: -40%; }
  to { left: 100%; }
}

.chat-container {
  flex: 1;
  border-radius: 24px;
  overflow: hidden;
  background:
    linear-gradient(rgba(8,20,15,0.88), rgba(3,9,7,0.96)),
    repeating-linear-gradient(
      135deg,
      #10231b,
      #10231b 8px,
      #0a1712 8px,
      #0a1712 16px
    );

  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: inset 0 0 35px rgba(0,0,0,0.3);
}

/* ---------- CHATROOM STYLING ---------- */

.chatroom,
.chatroom * {
  font-family: "Inter", sans-serif !important;
}

.chatroom {
  width: 100% !important;
  height: 100% !important;
  border: none !important;
  box-shadow: none !important;
  background: transparent !important;
  display: flex !important;
  flex-direction: column !important;
}

/* Header bewusst als Premium-Leiste */
.chatroom .header,
.chatroom header,
.chatroom .chatroom-title,
.chatroom .title {
  background: linear-gradient(135deg, var(--green), #012f1c) !important;
  color: white !important;
  border: none !important;
  min-height: 38px !important;
  height: 38px !important;
  padding: 9px 16px !important;
  font-size: 13px !important;
  font-weight: 700 !important;
  letter-spacing: 1.4px !important;
  text-transform: uppercase !important;
}

.chatroom .chats {
  flex: 1 !important;
  height: auto !important;
  overflow-y: auto !important;
  padding: 18px !important;
  background: transparent !important;
}

.chatroom .message,
.chatroom .message.bot,
.chatroom .message.user,
.chatroom .message.received,
.chatroom .message.sent {
  max-width: 78% !important;
  padding: 11px 14px !important;
  border-radius: 18px !important;
  font-size: 14px !important;
  line-height: 1.35 !important;
  box-shadow: 0 10px 26px rgba(0,0,0,0.28) !important;
}

.chatroom .message.bot,
.chatroom .message.received {
  background: rgba(255,255,255,0.10) !important;
  color: #f5faf7 !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
  margin-right: auto !important;
}

.chatroom .message.user,
.chatroom .message.sent {
  background: linear-gradient(135deg, #f7f8f6, #cfd8d3) !important;
  color: #06120d !important;
  border: 1px solid rgba(255,255,255,0.75) !important;
  margin-left: auto !important;
  font-weight: 500 !important;
}

.chatroom small,
.chatroom .time,
.chatroom .message-time {
  color: rgba(255,255,255,0.45) !important;
  font-size: 10px !important;
}

.chatroom form,
.chatroom .input,
.chatroom .input-area {
  flex-shrink: 0 !important;
  background: rgba(3,9,7,0.92) !important;
  border-top: 1px solid rgba(255,255,255,0.14) !important;
  border-radius: 0 0 24px 24px !important;
}

.chatroom input,
.chatroom textarea {
  background: rgba(255,255,255,0.10) !important;
  color: white !important;
  border: 1px solid rgba(255,255,255,0.22) !important;
  border-radius: 999px !important;
  padding-left: 14px !important;
}

.chatroom input:focus,
.chatroom textarea:focus {
  outline: none !important;
  border-color: rgba(255,255,255,0.65) !important;
  box-shadow: 0 0 18px rgba(0,66,37,0.45) !important;
}

.chatroom button {
  background: linear-gradient(135deg, #f7f8f6, #b9c8c0) !important;
  color: #06120d !important;
  border: none !important;
  border-radius: 999px !important;
  font-family: "Orbitron", sans-serif !important;
  font-size: 10px !important;
  letter-spacing: 1px !important;
  font-weight: 700 !important;
}

.chatroom ::-webkit-scrollbar {
  width: 7px;
}

.chatroom ::-webkit-scrollbar-track {
  background: transparent;
}

.chatroom ::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.24);
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div class="intro-screen" id="introScreen">
  <div class="intro-card">
    <span id="welcome-word">Welcome</span>
    <h1 class="intro-logo">ATMOX</h1>
    <button class="enter-btn" id="enterAtmox">Enter Atmosphere</button>
  </div>
</div>

<div class="app">
  <div class="atmox-card">

    <div class="brand">
      <div class="brand-title">ATMOX</div>
      <div class="brand-subtitle">Atmospheric Intelligence</div>
      <div class="brand-credit">Powered by Marius Zöllner</div>
    </div>

    <div class="scan-line"></div>

    <div class="chat-container"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
const words = [
  "Welcome",
  "Willkommen",
  "Bienvenue",
  "Bienvenido",
  "Benvenuto",
  "Welkom",
  "Witamy",
  "Karibu",
  "ようこそ",
  "환영합니다"
];

let index = 0;
const welcomeWord = document.getElementById("welcome-word");

setInterval(() => {
  index = (index + 1) % words.length;
  welcomeWord.textContent = words[index];
}, 2500);

const introScreen = document.getElementById("introScreen");
const enterAtmox = document.getElementById("enterAtmox");

enterAtmox.addEventListener("click", () => {
  introScreen.classList.add("hidden");
});

var chatroom = new window.Chatroom({
  host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
  title: "ATMOX Core",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
  speechRecognition: "en-US",
  voiceLang: "en-US"
});

chatroom.openChat();

function fixChatTitle() {
  document.querySelectorAll(".chat-container *").forEach(el => {
    if (el.textContent.trim() === "Chat") {
      el.textContent = "ATMOX Core";
    }
  });
}

fixChatTitle();
setTimeout(fixChatTitle, 300);
setTimeout(fixChatTitle, 1000);

new MutationObserver(fixChatTitle).observe(
  document.querySelector(".chat-container"),
  { childList: true, subtree: true }
);
</script>

</body>
</html>
