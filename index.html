<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATMOX Chatbot</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #050505;
  font-family: "Inter", Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* ---------- INTRO ---------- */

.intro-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    repeating-linear-gradient(45deg,#2b2b2b,#2b2b2b 10px,#151515 10px,#151515 22px);
  z-index: 10;
  transition: opacity 1s ease;
}

.intro-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.cloud {
  position: absolute;
  background: rgba(190,190,190,0.3);
  border-radius: 999px;
  filter: blur(30px);
}

.cloud-1 { width: 600px; height: 200px; left: -100px; top: 20%; }
.cloud-2 { width: 650px; height: 220px; right: -120px; bottom: 20%; }

.intro-content {
  text-align: center;
  cursor: pointer;
}

#welcome-word {
  display: block;
  font-size: 22px;
  margin-bottom: 10px;
  color: #ccc;
}

.intro-content h1 {
  font-family: "Orbitron";
  letter-spacing: 8px;
}

/* ---------- CHAT ---------- */

.chat-page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-wrapper {
  width: 470px;
  height: 690px;
  border-radius: 24px;
  padding: 24px;
  background: linear-gradient(#222,#111);
  display: flex;
  flex-direction: column;
}

.chat-title {
  text-align: center;
  font-family: "Orbitron";
  letter-spacing: 7px;
}

.chat-subtitle {
  font-size: 11px;
  color: #999;
  margin-top: 8px;
}

.chat-credit {
  font-size: 10px;
  color: #666;
}

.glow-line {
  height: 1px;
  margin: 14px 0;
  background: linear-gradient(90deg,transparent,#aaa,transparent);
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

.chat-container {
  flex: 1;
  border-radius: 18px;
  overflow: hidden;
}

/* ---------- CHATROOM FIX ---------- */

.chatroom {
  display: flex !important;
  flex-direction: column !important;
  height: 100% !important;
}

/* KILL HEADER */
.chatroom .header,
.chatroom header,
.chatroom .chatroom-title,
.chatroom .title {
  display: none !important;
}

.chatroom .chats {
  flex: 1 !important;
  overflow-y: auto !important;
  padding: 18px !important;
}

.chatroom form {
  flex-shrink: 0 !important;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro-screen" id="intro">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>

  <div class="intro-content" onclick="enterApp()">
    <span id="welcome-word">Welcome</span>
    <h1>ATMOX</h1>
    <div>Click to enter</div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-page">
  <div class="chat-wrapper">

    <div class="chat-title">
      ATMOX
      <div class="chat-subtitle">Where Weather Meets Intelligence</div>
      <div class="chat-credit">Powered by Marius</div>
    </div>

    <div class="glow-line"></div>

    <div class="chat-container"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>

/* 🌍 Sprachwechsel */
const words = ["Welcome","Willkommen","Bienvenue","Bienvenido","Benvenuto","Welkom","Witamy","Karibu","ようこそ","환영합니다"];
let i = 0;

setInterval(() => {
  i = (i + 1) % words.length;
  document.getElementById("welcome-word").textContent = words[i];
}, 3000);

/* Intro schließen */
function enterApp(){
  document.getElementById("intro").classList.add("hidden");
}

/* Chat */
var chatroom = new window.Chatroom({
  host: "https://congenial-space-goldfish-xrw9rrx4g4qq2x5q-5005.app.github.dev",
  title: "",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "Hello and welcome to ATMOX. How can I help you?",
  speechRecognition: "en-US",
  voiceLang: "en-US"
});

chatroom.openChat();

</script>

</body>
</html>
